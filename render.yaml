databases:
  - name: livestockdb
    plan: free

services:
  - type: web
    name: livestock
    runtime: python
    plan: free
    buildCommand: "./build.sh"
    startCommand: "python -m gunicorn livestock.asgi:application -k uvicorn.workers.UvicornWorker"
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: livestockdb
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: WEB_CONCURRENCY
        value: "4"
