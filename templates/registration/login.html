<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <title>تسجيل الدخول</title>
</head>
<body>
  <h2>تسجيل الدخول</h2>

  {% if form.errors %}
    <p>اسم المستخدم أو كلمة المرور غير صحيحة.</p>
  {% endif %}

  <form method="post">
    {% csrf_token %}
    {% if next %}
      <input type="hidden" name="next" value="{{ next }}">
    {% endif %}
    {{ form.as_p }}
    <button type="submit">دخول</button>
  </form>
</body>
</html>
