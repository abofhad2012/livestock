<!doctype html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>تم تغيير كلمة المرور | محاسبة المواشي</title>

  <style>
    :root{
      --bg:#0b1220;
      --panel:rgba(11,23,51,.72);
      --line:rgba(255,255,255,.10);
      --text:#eef4ff;
      --muted:rgba(238,244,255,.72);
      --green:#22c55e;
      --blue:#7dd3fc;
    }

    *{box-sizing:border-box}

    body{
      margin:0;
      min-height:100vh;
      font-family:system-ui,Segoe UI,Arial,sans-serif;
      background:
        radial-gradient(900px 600px at 80% 20%, rgba(43,118,198,.20), transparent 55%),
        radial-gradient(800px 600px at 20% 30%, rgba(34,197,94,.10), transparent 55%),
        var(--bg);
      color:var(--text);
      display:flex;
      align-items:center;
      justify-content:center;
      padding:20px;
    }

    .wrap{
      width:min(520px,94vw);
      background:var(--panel);
      border:1px solid var(--line);
      border-radius:18px;
      padding:22px;
      box-shadow:0 18px 45px rgba(0,0,0,.45);
      text-align:center;
    }

    .brand-icon{
      width:52px;
      height:52px;
      border-radius:16px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      background:rgba(34,197,94,.13);
      border:1px solid rgba(34,197,94,.25);
      font-size:26px;
      margin-bottom:10px;
    }

    h2{
      margin:0 0 10px;
      font-size:24px;
      color:var(--green);
    }

    p{
      margin:0;
      color:var(--muted);
      line-height:1.9;
      font-size:14px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      min-width:220px;
      height:46px;
      border:0;
      border-radius:12px;
      margin-top:18px;
      padding:0 18px;
      background:var(--green);
      color:#07111f;
      font-weight:900;
      cursor:pointer;
      text-decoration:none;
      font:inherit;
    }

    .btn:hover{
      opacity:.92;
      text-decoration:none;
    }

    .links{
      margin-top:18px;
      line-height:2;
      font-size:14px;
    }

    a{
      color:var(--blue);
      text-decoration:none;
      font-weight:800;
    }

    a:hover{
      text-decoration:underline;
    }
  </style>
</head>

<body>
  <main class="wrap">
    <div class="brand-icon">✅</div>
    <h2>تم تغيير كلمة المرور بنجاح</h2>

    <p>
      يمكنك الآن تسجيل الدخول باستخدام كلمة المرور الجديدة.
    </p>

    <a class="btn" href="{% url 'login' %}">الانتقال إلى تسجيل الدخول</a>

    <div class="links">
      <div>
        <a href="/">العودة إلى الرئيسية</a>
      </div>
    </div>
  </main>
</body>
</html>
